<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Markdown Editor как на GitHub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    .editor-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      max-width: 100%;
    }

    .controls {
      padding: 8px 12px;
      background-color: #f6f8fa;
      border-bottom: 1px solid #e1e4e8;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .controls button {
      padding: 8px 12px;
      background-color: #24292e;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      flex: 1 1 auto;
      min-width: 120px;
      -webkit-tap-highlight-color: transparent;
    }

    .controls button:active {
      opacity: 0.8;
      transform: scale(0.98);
    }

    .controls button.save-html {
      background-color: #2ea44f;
    }

    /* Главный контент */
    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
      flex-direction: row;
    }

    /* Левая панель - редактор */
    .edit-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e1e4e8;
      background-color: #ffffff;
    }

    .section-header {
      padding: 8px 12px;
      background-color: #f6f8fa;
      border-bottom: 1px solid #e1e4e8;
      font-size: 12px;
      color: #586069;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-header i {
      font-style: normal;
    }

    textarea {
      flex: 1;
      width: 100%;
      border: none;
      resize: none;
      padding: 12px;
      font-size: 16px; /* Предотвращает зум на iPhone */
      line-height: 1.5;
      outline: none;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', monospace;
      -webkit-appearance: none;
      border-radius: 0;
    }

    /* Правая панель - превью */
    .preview-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background-color: #ffffff;
    }

    #markdown-output {
      flex: 1;
      padding: 12px 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      font-size: 14px;
    }

    /* Стили для превью (оптимизированы для мобильных) */
    #markdown-output h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 20px 0 12px;
      border-bottom: 1px solid #e1e4e8;
      padding-bottom: 0.3em;
      line-height: 1.3;
    }

    #markdown-output h2 {
      font-size: 18px;
      font-weight: 600;
      margin: 18px 0 12px;
      border-bottom: 1px solid #e1e4e8;
      padding-bottom: 0.3em;
      line-height: 1.3;
    }

    #markdown-output h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 16px 0 12px;
      line-height: 1.3;
    }

    #markdown-output p {
      margin: 0 0 12px;
      line-height: 1.5;
    }

    #markdown-output ul, #markdown-output ol {
      padding-left: 1.5em;
      margin: 0 0 12px;
    }

    #markdown-output li {
      margin: 4px 0;
      line-height: 1.5;
    }

    #markdown-output code {
      background-color: rgba(27, 31, 35, 0.05);
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', monospace;
      font-size: 85%;
      word-break: break-word;
    }

    #markdown-output pre {
      background-color: #f6f8fa;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 12px 0;
    }

    #markdown-output pre code {
      background-color: transparent;
      padding: 0;
      border: none;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #markdown-output blockquote {
      padding: 0 0 0 12px;
      color: #6a737d;
      border-left: 4px solid #e1e4e8;
      margin: 0 0 12px;
    }

    #markdown-output table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0;
      font-size: 14px;
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    #markdown-output table th,
    #markdown-output table td {
      padding: 6px 10px;
      border: 1px solid #e1e4e8;
      min-width: 80px;
    }

    #markdown-output img {
      max-width: 100%;
      height: auto;
    }

    /* Мобильная версия: вертикальное расположение */
    @media (max-width: 768px) {
      .main-content {
        flex-direction: column;
      }

      .edit-section {
        border-right: none;
        border-bottom: 1px solid #e1e4e8;
        max-height: 50vh;
      }

      .preview-section {
        max-height: 50vh;
      }

      .section-header {
        padding: 6px 10px;
        font-size: 11px;
      }

      textarea {
        padding: 10px;
        font-size: 15px;
      }

      #markdown-output {
        padding: 10px 12px;
      }

      .controls button {
        padding: 10px 8px;
        font-size: 13px;
        min-width: 100px;
      }
    }

    /* Для очень маленьких экранов */
    @media (max-width: 480px) {
      .controls {
        padding: 6px 8px;
        gap: 4px;
      }

      .controls button {
        padding: 8px 6px;
        font-size: 12px;
        min-width: 80px;
      }

      .section-header {
        padding: 5px 8px;
        font-size: 10px;
      }

      textarea {
        padding: 8px;
        font-size: 14px;
      }

      #markdown-output h1 {
        font-size: 20px;
        margin: 16px 0 10px;
      }

      #markdown-output h2 {
        font-size: 18px;
        margin: 14px 0 10px;
      }
    }

    /* Для устройств с сенсорным экраном */
    @media (hover: none) and (pointer: coarse) {
      .controls button {
        padding: 10px 12px;
      }

      .controls button:active {
        background-color: #1a1e23;
      }

      .controls button.save-html:active {
        background-color: #2c974b;
      }
    }

    /* Убираем скроллбар для превью на мобильных */
    .preview-section::-webkit-scrollbar {
      width: 4px;
    }

    .preview-section::-webkit-scrollbar-thumb {
      background-color: #e1e4e8;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="editor-container">
    <!-- Кнопки управления -->
    <div class="controls">
      <button onclick="saveMarkdown()">📄 Сохранить .md</button>
      <button class="save-html" onclick="saveAsHTML()">💾 Сохранить HTML</button>
    </div>

    <!-- Контейнер с редактором слева и превью справа -->
    <div class="main-content">
      <!-- Левая панель - редактор -->
      <div class="edit-section">
        <div class="section-header">
          <i>✏️</i> РЕДАКТОР (Markdown)
        </div>
        <textarea id="markdown-input" placeholder="Введите Markdown..."># Заголовок в стиле GitHub
Это обычный текст с **жирным** выделением.

```javascript
// Код с подсветкой синтаксиса
function helloWorld() {
  console.log("Привет, мир!");
}
```</textarea>
      </div>

      <!-- Правая панель - превью -->
      <div class="preview-section">
        <div class="section-header">👁️ ПРЕВЬЮ (HTML результат)</div>
        <div id="markdown-output"></div>
      </div>
    </div>

    <!-- Старые элементы скрыты, но оставлены для совместимости -->
    <div class="tabs" style="display: none;">
      <button class="tab-active">Edit</button>
      <button>Preview</button>
    </div>
    <div id="edit-panel" style="display: none;"></div>
    <div id="preview-panel" style="display: none;"></div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  // Элементы
  const markdownInput = document.getElementById('markdown-input');
  const markdownOutput = document.getElementById('markdown-output');

  // Рендеринг Markdown в HTML
  function renderMarkdown() {
    const markdownText = markdownInput.value;
    markdownOutput.innerHTML = marked.parse(markdownText);
  }

  // Рендерим при загрузке и при вводе текста
  renderMarkdown();
  markdownInput.addEventListener('input', renderMarkdown);

  // Функция сохранения Markdown-файла
  function saveMarkdown() {
    const markdownText = markdownInput.value;

    if (!markdownText.trim()) {
      alert('Нет текста для сохранения!');
      return;
    }

    const blob = new Blob([markdownText], { type: 'text/markdown' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'document.md';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
  }

  // Функция сохранения как HTML
  function saveAsHTML() {
    const markdownText = markdownInput.value;

    if (!markdownText.trim()) {
      alert('Нет текста для сохранения!');
      return;
    }

    // Конвертируем Markdown в HTML
    const htmlContent = marked.parse(markdownText);

    // Создаем полный HTML документ
    const fullHTML = `<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Markdown Preview</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown-light.min.css">
  <style>
    body {
      padding: 45px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .markdown-body {
      max-width: 980px;
      margin: 0 auto;
      box-sizing: border-box;
    }
    @media (max-width: 767px) {
      body { padding: 15px; }
    }
  </style>
</head>
<body>
  <div class="markdown-body">
    ${htmlContent}
  </div>
</body>
</html>`;

    // Сохраняем HTML файл
    const blob = new Blob([fullHTML], { type: 'text/html' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'preview.html';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);

    console.log('✅ HTML файл сохранен');
  }
</script>
</body>
</html>
