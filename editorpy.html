<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Local Editor</title>
    <!-- Подключаем файл, который вы скачали и залили на свой сайт -->
    <script src="/pyodide/pyodide.js"></script>
    <style>
        body { display: flex; height: 100vh; margin: 0; background: #1e1e1e; color: #d4d4d4; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; flex-direction: row; }
        .panel { flex: 1; display: flex; flex-direction: column; min-height: 0; border-right: 1px solid #333; }
        .label { background: #252526; padding: 10px 15px; font-size: 11px; color: #858585; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        textarea { flex: 1; padding: 15px; font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; border: none; background: #1e1e1e; color: #9cdcfe; outline: none; resize: none; tab-size: 4; }
        #output { flex: 1; padding: 15px; background: #000; color: #d7ba7d; font-family: 'Consolas', monospace; overflow-y: auto; white-space: pre-wrap; font-size: 14px; border-top: 1px solid #333; }
        .run-btn { background: #0e639c; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 2px; font-size: 12px; transition: 0.2s; }
        .run-btn:hover { background: #1177bb; }
        .run-btn:disabled { background: #3a3d41; color: #757575; cursor: not-allowed; }
        .status-ready { color: #4ec9b0; font-weight: bold; }
        .status-load { color: #ce9178; }
        @media (max-width: 768px) { body { flex-direction: column; } .panel { height: 50vh; border-right: none; } }
    </style>
</head>
<body>

    <div class="panel">
        <div class="label">
            <span>🐍 Редактор кода</span>
            <button class="run-btn" id="run-btn" disabled>⌛ Загрузка Python...</button>
        </div>
        <textarea id="code" spellcheck="false" autofocus># Твой локальный Python редактор
import sys

print("Привет! Python загружен с твоего сервера.")
print(f"Платформа: {sys.platform}")

data = [i for i in range(1, 6)]
print(f"Список: {data}")
print(f"Сумма: {sum(data)}")</textarea>
    </div>

    <div class="panel">
        <div class="label">
            <span>📡 Консоль вывода</span>
            <span id="status-text" class="status-load">Инициализация...</span>
        </div>
        <div id="output">Подождите, идет подготовка интерпретатора...</div>
    </div>

    <script>
        const textarea = document.getElementById('code');
        const output = document.getElementById('output');
        const runBtn = document.getElementById('run-btn');
        const statusText = document.getElementById('status-text');
        let pyodide = null;

        // 1. Загрузка Pyodide из ВАШЕЙ локальной папки
        async function initPyodide() {
            try {
                // indexURL указывает на папку /pyodide/ в корне вашего сайта
                pyodide = await loadPyodide({
                    indexURL: "/pyodide/"
                });

                output.innerText = ">>> Python 3.12 готов к работе.\n";
                statusText.innerText = "Готов";
                statusText.className = "status-ready";
                runBtn.disabled = false;
                runBtn.innerText = "▶ Запустить (Ctrl+Enter)";
            } catch (err) {
                output.innerText = "❌ Ошибка загрузки файлов из /pyodide/:\n" + err.message +
                                   "\n\nПроверь, что файлы pyodide.js, .wasm и .zip лежат в папке /pyodide/";
                statusText.innerText = "Ошибка";
                console.error(err);
            }
        }

        // 2. Функция выполнения кода
        async function runPython() {
            if (!pyodide) return;

            output.innerText = "";
            // Перехватываем стандартный вывод Python (print)
            pyodide.setStdout({ batched: (str) => {
                output.innerText += str + "\n";
            }});

            try {
                await pyodide.runPythonAsync(textarea.value);
            } catch (err) {
                output.innerText += "\n⚠️ Ошибка в коде:\n" + err;
            }
        }

        // Обработка клавиш (Tab и Ctrl+Enter)
        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
            }
            if (e.ctrlKey && e.key === 'Enter') {
                runPython();
            }
        });

        runBtn.addEventListener('click', runPython);

        // Запуск инициализации
        initPyodide();
    </script>
</body>
</html>
